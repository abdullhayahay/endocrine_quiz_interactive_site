<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taiz University – Physiology II Examination</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .title-font { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="max-w-5xl mx-auto mt-10 bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-200">
    
    <!-- Header -->
    <div class="bg-blue-900 text-white p-8 text-center flex flex-col items-center">
      
      <!-- Batch Logo -->
      <img src="batch-logo.png" alt="Batch Committee Logo" class="w-40 mb-4 drop-shadow-2xl rounded-xl border-4 border-white">
      
      <h1 class="title-font text-3xl font-bold">Taiz University</h1>
      <h2 class="text-xl mt-2">Department of Pharmacy – Second Level</h2>
      <p class="mt-2">Physiology II – Official Examination</p>
      <div class="mt-4 bg-white text-blue-900 px-6 py-3 rounded-lg shadow-md">
        <h3 class="text-xl font-bold tracking-wide">Endocrine System Examination</h3>
      </div>
    </div>

    <div class="p-8">

      <!-- Student Info -->
      <div class="grid md:grid-cols-2 gap-4 mb-6">
        <input id="studentName" type="text" placeholder="Student Name" class="border p-2 rounded-lg w-full">
        <input id="studentID" type="text" placeholder="Student ID" class="border p-2 rounded-lg w-full">
      </div>

      <!-- Timer -->
      <div class="flex justify-between items-center mb-6">
        <div class="text-lg font-semibold">Time Remaining: <span id="timer" class="text-red-600">20</span> sec</div>
        <div class="text-lg font-semibold">Question <span id="currentQ">1</span> / 25</div>
      </div>

      <!-- Question Area -->
      <div id="questionBox" class="mb-6"></div>

      <!-- Navigation -->
      <div class="flex justify-between">
        <button onclick="prevQuestion()" class="bg-gray-500 text-white px-5 py-2 rounded-lg">Previous</button>
        <button onclick="nextQuestion()" class="bg-blue-800 text-white px-5 py-2 rounded-lg">Next</button>
      </div>

      <!-- Submit -->
      <div class="text-center mt-8">
        <button onclick="submitQuiz()" class="bg-green-700 text-white px-8 py-3 rounded-xl text-lg">Submit Examination</button>
      </div>

      <!-- Results -->
      <div id="resultSection" class="mt-10 hidden">
        <h3 class="text-2xl font-bold mb-4">Detailed Results</h3>
        <div id="scoreDisplay" class="text-xl font-semibold mb-4"></div>
        <div id="detailedResults" class="space-y-4"></div>
      </div>

    </div>
  </div>

<script>
const questions = [
  {q:"The endocrine system consists primarily of glands that secrete:", options:["Enzymes into ducts","Hormones into the blood or interstitial fluid","Neurotransmitters into synapses","Bile into the digestive tract"], answer:1},
  {q:"Compared with nerve impulses, the action of hormones is generally:", options:["Faster and shorter in duration","Slower and more prolonged","Instantaneous and permanent","Limited to skeletal muscle"], answer:1},
  {q:"Group I hormones are characterized by:", options:["Binding to cell surface receptors and being hydrophilic","Binding to intracellular receptors and being lipophilic","Being composed only of proteins","Acting only through second messengers"], answer:1},
  {q:"Which of the following is classified as a Group II hormone?", options:["Steroid hormone","Fatty acid derivative","Glycoprotein","Lipid-soluble hormone"], answer:2},
  {q:"Negative feedback is best described as:", options:["End product stimulates production","Starting substance inhibits final product","End product inhibits earlier steps","No regulation"], answer:2},
  {q:"Positive feedback example:", options:["Cortisol regulation","Aldosterone secretion","Oxytocin during labor","Insulin after meals"], answer:2},
  {q:"Pituitary gland location:", options:["Neck anterior to trachea","Inferior brain in sella turcica","Posterior thyroid","Above kidneys"], answer:1},
  {q:"HGH promotes growth by:", options:["Decreasing amino acids","Inhibiting ribosomes","Stimulating protein synthesis","Blocking tRNA"], answer:2},
  {q:"TSH acts on:", options:["Adrenal cortex","Ovaries","Thyroid gland","Kidneys"], answer:2},
  {q:"ADH targets:", options:["Adrenal medulla","Kidney tubules","Thyroid follicles","Pancreas"], answer:1},
  {q:"T3 and T4 increase:", options:["Calcium","Metabolic rate","Milk","Sodium excretion"], answer:1},
  {q:"PTH increases calcium by:", options:["Inhibiting osteoclasts","Decreasing renal reabsorption","Stimulating osteoclasts","Blocking vitamin D"], answer:2},
  {q:"Adrenal gland parts:", options:["Anterior/posterior","Cortex/medulla","Alpha/beta","Follicles"], answer:1},
  {q:"Glucocorticoids:", options:["Lower BP","Inhibit inflammation","Increase insulin","Decrease protein breakdown"], answer:1},
  {q:"Insulin lowers glucose by:", options:["Glycogenolysis","Blocking entry","Stimulating entry","Increasing production"], answer:2},
  {q:"Hormones classified by structure & receptor.", options:["True","False"], answer:0},
  {q:"Positive feedback maintains homeostasis.", options:["True","False"], answer:1},
  {q:"Posterior pituitary = neurohypophysis.", options:["True","False"], answer:0},
  {q:"Oxytocin controlled by negative feedback.", options:["True","False"], answer:1},
  {q:"Aldosterone influenced by RAAS.", options:["True","False"], answer:0},
  {q:"Adrenal medulla secretes epinephrine.", options:["True","False"], answer:0},
  {q:"Glucagon from beta cells.", options:["True","False"], answer:1},
  {q:"Thymus secretes thymosin.", options:["True","False"], answer:0},
  {q:"Secretin from gastric mucosa.", options:["True","False"], answer:1},
  {q:"Placenta secretes hCG.", options:["True","False"], answer:0}
];

let currentQuestion = 0;
let userAnswers = Array(questions.length).fill(null);
let timeLeft = 20;
let timerInterval;

function startTimer(){
  timeLeft = 20;
  document.getElementById("timer").innerText = timeLeft;
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;
    if(timeLeft <= 0){
      nextQuestion();
    }
  },1000);
}

function loadQuestion(){
  const q = questions[currentQuestion];
  document.getElementById("currentQ").innerText = currentQuestion+1;
  const box = document.getElementById("questionBox");
  box.innerHTML = `<p class='font-semibold mb-4'>${currentQuestion+1}. ${q.q}</p>`;
  q.options.forEach((opt,i)=>{
    box.innerHTML += `
      <label class='block mb-2'>
        <input type='radio' name='option' value='${i}' ${userAnswers[currentQuestion]===i?"checked":""} onchange='saveAnswer(${i})' class='mr-2'>${opt}
      </label>`;
  });
  startTimer();
}

function saveAnswer(val){ userAnswers[currentQuestion]=val; }

function nextQuestion(){
  if(currentQuestion < questions.length-1){
    currentQuestion++;
    loadQuestion();
  } else {
    submitQuiz();
  }
}

function prevQuestion(){
  if(currentQuestion>0){
    currentQuestion--;
    loadQuestion();
  }
}

function submitQuiz(){
  clearInterval(timerInterval);
  let score = 0;
  let detailedHTML="";

  questions.forEach((q,i)=>{
    const correct = q.answer;
    const user = userAnswers[i];
    const isCorrect = user===correct;
    if(isCorrect) score++;

    detailedHTML += `
      <div class='p-4 border rounded-lg ${isCorrect?"bg-green-50 border-green-400":"bg-red-50 border-red-400"}'>
        <p class='font-semibold'>Q${i+1}: ${q.q}</p>
        <p>Your Answer: ${user!=null?q.options[user]:"Not Answered"}</p>
        <p>Correct Answer: ${q.options[correct]}</p>
        <p class='font-bold ${isCorrect?"text-green-600":"text-red-600"}'>${isCorrect?"Correct":"Incorrect"}</p>
      </div>`;
  });

  document.getElementById("resultSection").classList.remove("hidden");
  document.getElementById("scoreDisplay").innerText = `Final Score: ${score} / ${questions.length}`;
  document.getElementById("detailedResults").innerHTML = detailedHTML;
  window.scrollTo(0,document.body.scrollHeight);
}

loadQuestion();
</script>

</body>
</html>
